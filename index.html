<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaishnuv Thiagarajan</title>
    <link rel="icon" type="image/png" href="./logo.png">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #111111;
            height: 100vh;
            display: flex;
            align-items: stretch;
            justify-content: center;
            padding: 20px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px;
            color: #d8d8d8;
            line-height: 1.7;
        }

        #terminal {
            width: 100%;
            display: flex;
            flex-direction: column;
            background: #0e0e0e;
            border: 1.5px solid #c8a020;
            border-radius: 6px;
            padding: 28px 34px 28px;
            cursor: text;
            overflow: hidden;
        }

        #output {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: none;
        }

        #output::-webkit-scrollbar {
            display: none;
        }

        .prompt {
            color: #c8a020;
            user-select: none;
        }

        .logo-pre {
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            line-height: 1;
            color: #ece0c4;
            white-space: pre;
            margin: 2px 0 8px;
            letter-spacing: 0;
        }

        .version-tag {
            font-size: 14px;
            color: #d8d8d8;
            margin-bottom: 2px;
        }

        .line {
            min-height: 1.5em;
            white-space: pre-wrap;
        }

        .cmd-name {
            color: #c8a020;
            display: inline-block;
            min-width: 140px;
        }

        .input-row {
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        #cmd-input {
            background: transparent;
            border: none;
            outline: none;
            color: #d8d8d8;
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px;
            flex: 1;
            caret-color: #c8a020;
        }

        a {
            color: #c8a020;
            text-decoration: none;
        }

        a:hover {
            color: #ffffff;
            text-decoration: underline;
        }

        @media (max-width: 620px) {
            .logo-pre { font-size: 6px; }
            body { padding: 12px; font-size: 13px; }
            #terminal { padding: 16px 18px; }
            #cmd-input { font-size: 13px; }
        }
    </style>
</head>
<body>
<div id="terminal">
    <div id="output"></div>
    <div class="input-row">
        <span class="prompt">visitor@vaishnuv:~$&nbsp;</span>
        <input id="cmd-input" type="text" autofocus spellcheck="false" autocomplete="off" />
    </div>
</div>

<script>
    // ─── Pixel font ───────────────────────────────────────────────────────────
    // Each letter is defined as rows of 1/0 bits (1 = filled block, 0 = empty).
    // Double-width blocks (██) give roughly square pixels in a monospace font.
    const FONT = {
        A: ["0110","1001","1111","1001","1001"],
        G: ["0111","1000","1011","1001","0111"],
        H: ["1001","1001","1111","1001","1001"],
        I: ["1111","0110","0110","0110","1111"],
        J: ["0011","0001","0001","1001","0110"],
        N: ["1001","1101","1011","1001","1001"],
        R: ["1110","1001","1110","1010","1001"],
        S: ["0111","1000","0110","0001","1110"],
        T: ["1111","0110","0110","0110","0110"],
        U: ["1001","1001","1001","1001","0110"],
        V: ["10001","10001","10001","01010","00100"],
    };

    const BLOCK = '██'; // ██
    const EMPTY = '  ';
    const GAP   = '  ';

    function renderAscii(text) {
        const chars = text.toUpperCase().split('');
        const rows  = [];
        for (let r = 0; r < 5; r++) {
            let row = '';
            chars.forEach((ch, i) => {
                const glyph = FONT[ch];
                if (!glyph) return;
                for (const bit of glyph[r]) {
                    row += bit === '1' ? BLOCK : EMPTY;
                }
                if (i < chars.length - 1 && FONT[chars[i + 1]]) row += GAP;
            });
            rows.push(row);
        }
        return rows.join('\n');
    }

    // ─── Terminal helpers ─────────────────────────────────────────────────────
    const output = document.getElementById('output');
    const input  = document.getElementById('cmd-input');

    const PROMPT  = '<span class="prompt">visitor@vaishnuv:~$</span> ';
    const VERSION = 'v2.0.0';

    function line(html, cls = 'line') {
        const d = document.createElement('div');
        d.className = cls;
        d.innerHTML = html;
        output.appendChild(d);
    }

    function blank() { line(''); }
    function sep()   { line('--'); }
    function promptLine() { line(PROMPT + '~'); }

    // ─── Commands ─────────────────────────────────────────────────────────────
    const COMMANDS = {
        help() {
            line('Available commands:');
            blank();
            line('<span class="cmd-name">about</span>      who am I');
            line('<span class="cmd-name">experience</span> where I\'ve worked');
            line('<span class="cmd-name">projects</span>   things I\'ve built');
            line('<span class="cmd-name">contact</span>    how to reach me');
            line('<span class="cmd-name">clear</span>      clear the terminal');
        },
        about() {
            line('Vaishnuv Thiagarajan');
            blank();
            line('ECE Honors + Business Honors @ UT Austin (Texas ECB)');
            line('<a href="https://txproduct.org" target="_blank">President @ Texas Product Engineering Organization (TPEO)</a>');
            blank();
            line('Builder | Leader | Student');
            line('Hobbies: vibecoding or touching grass');
            line('Location: Austin, TX');
        },
        experience() {
            line('Experience:');
            blank();
            line('  Product Management Intern @ IBM');
            line('  AI Solutions Engineer @ Lendflow (YC W21)');
            line('  Growth &amp; Strategy Partner @ Anthropic');
            line('  Technology Analyst Intern @ State Farm');
        },
        projects() {
            line('Projects:');
            blank();
            line('  AI Agentic Deals Dashboard (Lendflow)');
            line('  Hardware-as-a-Service Web Platform');
            line('  <a href="https://www.scriptic.xyz/" target="_blank">Scriptic - AI Webpage Search Extension</a>');
            line('  <a href="https://www.aidr-app.xyz/" target="_blank">Aidr: Outdoor Safety Guidance App</a>');
        },
        contact() {
            line('Contact:');
            blank();
            line('  GitHub    <a href="https://github.com/VaishnuvT" target="_blank">github.com/VaishnuvT</a>');
            line('  LinkedIn  <a href="https://linkedin.com/in/Vaishnuv-Thiagarajan" target="_blank">linkedin.com/in/Vaishnuv-Thiagarajan</a>');
            line('  Email     <a href="mailto:vaishnuv.thiagarajan@gmail.com">vaishnuv.thiagarajan@gmail.com</a>');
        },
        clear() {
            output.innerHTML = '';
            welcome();
        }
    };

    function run(raw) {
        line(PROMPT + raw);
        blank();
        if (!raw.trim()) { promptLine(); return; }
        const cmd = raw.trim().toLowerCase();
        if (COMMANDS[cmd]) {
            COMMANDS[cmd]();
        } else {
            line("command not found: " + raw.trim() + ". Type 'help' for available commands.");
        }
        blank();
        promptLine();
        output.scrollTop = output.scrollHeight;
    }

    // ─── Welcome screen ───────────────────────────────────────────────────────
    function welcome() {
        promptLine();
        blank();

        const pre = document.createElement('pre');
        pre.className = 'logo-pre';
        pre.textContent = renderAscii('VAISHNUV') + '\n\n' + renderAscii('THIAGARAJAN');
        output.appendChild(pre);

        const ver = document.createElement('div');
        ver.className = 'version-tag';
        ver.textContent = VERSION;
        output.appendChild(ver);

        blank();
        line("Type 'help' to see list of available commands.");
        blank();
        sep();
        blank();
        line("Builder | Leader | Student &mdash; UT Austin.");
        sep();
        blank();
        promptLine();
    }

    input.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            const val = input.value;
            input.value = '';
            run(val);
        }
    });

    document.getElementById('terminal').addEventListener('click', () => input.focus());

    welcome();
</script>
</body>
</html>
