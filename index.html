<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaishnuv Thiagarajan</title>
    <link rel="icon" type="image/png" href="./logo.png">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { height: 100%; overflow: hidden; }

        body {
            background: #000000;
            height: 100vh;
            display: flex;
            align-items: stretch;
            justify-content: center;
            padding: 40px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px;
            color: #ece0c4;
            line-height: 1.7;
        }

        #terminal {
            width: 100%;
            display: flex;
            flex-direction: column;
            background: #0e0e0e;
            border: 1.5px solid #333F48;
            border-radius: 6px;
            padding: 28px 34px;
            overflow: hidden;
            cursor: text;
        }

        #output {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: none;
        }
        #output::-webkit-scrollbar { display: none; }

        /* Hidden keyboard capture input */
        #capture {
            position: absolute;
            left: -9999px;
            opacity: 0;
            width: 1px;
            height: 1px;
            pointer-events: none;
        }

        .prompt { color: #BF5700; user-select: none; }

        .welcome-row {
            display: flex;
            align-items: flex-start;
            gap: 32px;
            flex-wrap: wrap;
        }
        .welcome-left { flex: 0 0 auto; min-width: 0; overflow: hidden; }
        .welcome-right { flex: 0 0 auto; overflow: hidden; }

        .logo-pre {
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            line-height: 1;
            color: #ece0c4;
            white-space: pre;
            margin: 2px 0 8px;
        }

        .portrait-pre {
            font-family: 'Courier New', Courier, monospace;
            font-size: 5px;
            line-height: 1;
            color: #ece0c4;
            white-space: pre;
            opacity: 0.85;
        }

        .line { min-height: 1.5em; white-space: pre-wrap; }

        .menu-item { line-height: 1.7; white-space: pre; }
        .menu-item.active { color: #ece0c4; }
        .menu-item.inactive { color: #666; }
        .menu-arrow { color: #BF5700; }

        .live-line { min-height: 1.5em; white-space: pre-wrap; }

        .cursor {
            display: inline-block;
            width: 0.55em;
            height: 1em;
            background: #ece0c4;
            vertical-align: text-bottom;
            animation: blink 1s steps(1) infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .cmd-name { color: #BF5700; display: inline-block; min-width: 140px; }

        a { color: #F8971F; text-decoration: none; }
        a:hover { color: #ffffff; text-decoration: underline; }

        @media (max-width: 900px) {
            body { padding: 24px; }
            .logo-pre { font-size: 9px; }
            .portrait-pre { font-size: 4px; }
        }

        @media (max-width: 640px) {
            body { padding: 10px; font-size: 13px; }
            #terminal { padding: 14px 16px; }
            .logo-pre { font-size: 5px; }
            .portrait-pre { font-size: 3.5px; }
            .welcome-left { width: 100%; }
            .welcome-right { width: 100%; }
            .welcome-row { gap: 16px; }
        }
    </style>
</head>
<body>
<div id="terminal">
    <div id="output"></div>
</div>
<input id="capture" type="text" autocomplete="off" spellcheck="false" />

<script>
    // ── Logo ─────────────────────────────────────────────────────────────────
    const LOGO = ` ██╗   ██╗  █████╗  ██╗ ███████╗ ██╗  ██╗ ███╗   ██╗ ██╗   ██╗ ██╗   ██╗
 ██║   ██║ ██╔══██╗ ██║ ██╔════╝ ██║  ██║ ████╗  ██║ ██║   ██║ ██║   ██║
 ██║   ██║ ███████║ ██║ ███████╗ ███████║ ██╔██╗ ██║ ██║   ██║ ██║   ██║
 ╚██╗ ██╔╝ ██╔══██║ ██║ ╚════██║ ██╔══██║ ██║╚██╗██║ ██║   ██║ ╚██╗ ██╔╝
  ╚████╔╝  ██║  ██║ ██║ ███████║ ██║  ██║ ██║ ╚████║ ╚██████╔╝  ╚████╔╝
   ╚═══╝   ╚═╝  ╚═╝ ╚═╝ ╚══════╝ ╚═╝  ╚═╝ ╚═╝  ╚═══╝  ╚═════╝    ╚═══╝

 ████████╗ ██╗  ██╗ ██╗  █████╗   ██████╗   █████╗  ██████╗   █████╗       ██╗  █████╗  ███╗   ██╗
 ╚══██╔══╝ ██║  ██║ ██║ ██╔══██╗ ██╔════╝  ██╔══██╗ ██╔══██╗ ██╔══██╗      ██║ ██╔══██╗ ████╗  ██║
    ██║    ███████║ ██║ ███████║ ██║  ███╗ ███████║ ██████╔╝ ███████║      ██║ ███████║ ██╔██╗ ██║
    ██║    ██╔══██║ ██║ ██╔══██║ ██║   ██║ ██╔══██║ ██╔══██╗ ██╔══██║ ██   ██║ ██╔══██║ ██║╚██╗██║
    ██║    ██║  ██║ ██║ ██║  ██║ ╚██████╔╝ ██║  ██║ ██║  ██║ ██║  ██║ ╚█████╔╝ ██║  ██║ ██║ ╚████║
    ╚═╝    ╚═╝  ╚═╝ ╚═╝ ╚═╝  ╚═╝  ╚═════╝  ╚═╝  ╚═╝ ╚═╝  ╚═╝ ╚═╝  ╚═╝  ╚════╝  ╚═╝  ╚═╝ ╚═╝  ╚═══╝`;

    // ── DOM ──────────────────────────────────────────────────────────────────
    const output  = document.getElementById('output');
    const capture = document.getElementById('capture');

    const PROMPT_HTML = '<span class="prompt">visitor@portfolio:~$</span> ';
    const MENU_ITEMS  = ['about', 'experience', 'projects', 'contact'];

    // ── State ────────────────────────────────────────────────────────────────
    let mode    = 'menu';
    let menuIdx = 0;
    let buffer  = '';
    let menuEl  = null;
    let liveEl  = null;

    // ── Helpers ───────────────────────────────────────────────────────────────
    function addEl(tag, cls, html) {
        const d = document.createElement(tag);
        if (cls)            d.className = cls;
        if (html !== undefined) d.innerHTML = html;
        output.appendChild(d);
        return d;
    }
    function line(html) { addEl('div', 'line', html); }
    function blank()    { addEl('div', 'line', ''); }
    function promptLine(cmd) { line(PROMPT_HTML + (cmd || '')); }
    function scroll()   { output.scrollTop = output.scrollHeight; }
    function esc(s)     { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // ── Menu ─────────────────────────────────────────────────────────────────
    function showMenu() {
        mode    = 'menu';
        menuIdx = 0;
        menuEl  = addEl('div', 'menu-list');
        renderMenu();
        scroll();
        capture.focus();
    }

    function renderMenu() {
        menuEl.innerHTML = MENU_ITEMS.map((item, i) => {
            const active = i === menuIdx;
            return `<div class="menu-item ${active ? 'active' : 'inactive'}">`
                 + `<span class="menu-arrow">${active ? '❯' : ' '}</span> ${item}</div>`;
        }).join('');
    }

    function confirmMenu() {
        const chosen = MENU_ITEMS[menuIdx];
        menuEl.remove(); menuEl = null;
        promptLine(chosen);
        blank();
        COMMANDS[chosen]();
        blank();
        promptLine();
        showMenu();
        scroll();
    }

    // ── Live typing line ──────────────────────────────────────────────────────
    function showLiveLine() {
        liveEl = addEl('div', 'live-line');
        renderLiveLine();
    }

    function renderLiveLine() {
        liveEl.innerHTML = PROMPT_HTML + esc(buffer) + '<span class="cursor"></span>';
        scroll();
    }

    // ── Commands ──────────────────────────────────────────────────────────────
    const COMMANDS = {
        about() {
            line('ECB Honors student at UT Austin (Electrical &amp; Computer Engineering Honors and Canfield Business Honors). I love to build things and explore opportunities in technology and business, such as Entrepreneurship, PM, or SWE.');
            blank();
            line('Hobbies: vibecoding or touching grass');
            line('Location: Austin, TX');
            blank();
            line('Bay area born, raised in the heart of Texas 🤘');
        },
        experience() {
            line('  Product Management Intern @ IBM');
            line('  AI Solutions Engineer @ Lendflow (YC W21)');
            line('  Growth &amp; Strategy Partner @ Anthropic');
            line('  Technology Analyst Intern @ State Farm');
        },
        projects() {
            line('  AI Agentic Deals Dashboard (Lendflow)');
            line('  <a href="https://github.com/nitinjaladanki/18470-SWEGroup10" target="_blank">Hardware-as-a-Service Web Platform</a>');
            line('  <a href="https://www.scriptic.xyz/" target="_blank">Scriptic - AI Webpage Search Extension</a>');
            line('  <a href="https://www.aidr-app.xyz/" target="_blank">Aidr: Outdoor Safety Guidance App</a>');
        },
        contact() {
            line('  <a href="https://github.com/VaishnuvT" target="_blank">GitHub</a>');
            line('  <a href="https://linkedin.com/in/Vaishnuv-Thiagarajan" target="_blank">LinkedIn</a>');
            line('  <a href="mailto:vaishnuv.thiagarajan@gmail.com">Email</a>');
        },
        help() {
            line('  Use ↑ ↓ arrow keys and Enter to navigate, or type a section name:');
            blank();
            MENU_ITEMS.forEach(item => line('  ' + item));
        },
        clear() {
            output.innerHTML = '';
            welcome();
        }
    };

    // ── Keyboard handler ──────────────────────────────────────────────────────
    capture.addEventListener('keydown', e => {
        if (mode === 'menu') {
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                menuIdx = Math.max(0, menuIdx - 1);
                renderMenu();
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                menuIdx = Math.min(MENU_ITEMS.length - 1, menuIdx + 1);
                renderMenu();
            } else if (e.key === 'Enter') {
                e.preventDefault();
                confirmMenu();
            } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
                menuEl.remove(); menuEl = null;
                mode   = 'typing';
                buffer = e.key;
                showLiveLine();
            }

        } else if (mode === 'typing') {
            if (e.key === 'Enter') {
                e.preventDefault();
                const cmd = buffer.trim().toLowerCase();
                liveEl.innerHTML = PROMPT_HTML + esc(cmd);
                liveEl = null;
                buffer = '';
                blank();
                if (cmd === 'clear') {
                    output.innerHTML = '';
                    welcome();
                    return;
                }
                if (COMMANDS[cmd]) {
                    COMMANDS[cmd]();
                } else if (cmd !== '') {
                    line('command not found: ' + esc(cmd) + ". Type 'help' for options.");
                }
                blank();
                promptLine();
                showMenu();

            } else if (e.key === 'Backspace') {
                e.preventDefault();
                buffer = buffer.slice(0, -1);
                if (buffer === '') {
                    liveEl.remove(); liveEl = null;
                    showMenu();
                } else {
                    renderLiveLine();
                }

            } else if (e.key === 'Escape') {
                e.preventDefault();
                buffer = '';
                if (liveEl) { liveEl.remove(); liveEl = null; }
                showMenu();

            } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
                buffer += e.key;
                renderLiveLine();
            }
        }
    });

    document.getElementById('terminal').addEventListener('click', () => capture.focus());

    // ── Welcome ───────────────────────────────────────────────────────────────
    function welcome() {
        // Date/time — no prompt
        line('Welcome to my portfolio: ' + new Date().toString().replace(/\s*\(.*\)$/, ''));
        blank();

        // Two-column: name + portrait
        const row  = document.createElement('div');
        row.className = 'welcome-row';

        const left = document.createElement('div');
        left.className = 'welcome-left';

        const logoPre = document.createElement('pre');
        logoPre.className = 'logo-pre';
        logoPre.textContent = LOGO;
        left.appendChild(logoPre);

        const addLeft = html => {
            const d = document.createElement('div');
            d.className = 'line';
            d.innerHTML = html;
            left.appendChild(d);
        };
        addLeft('');
        addLeft('Builder | Leader | Student');
        addLeft('');
        addLeft('ECE Honors + Business Honors @ UT Austin (Texas ECB)');
        addLeft('');
        addLeft('<a href="https://txproduct.org" target="_blank">President of Texas Product Engineering Organization (TPEO)</a>');

        const right    = document.createElement('div');
        right.className = 'welcome-right';
        const portrait  = document.createElement('pre');
        portrait.className = 'portrait-pre';
        fetch('./portrait.txt').then(r => r.text()).then(t => { portrait.textContent = t; });
        right.appendChild(portrait);

        row.appendChild(left);
        row.appendChild(right);
        output.appendChild(row);

        blank();
        promptLine("type 'help' to see list of available commands.");
        blank();
        showMenu();
    }

    welcome();
    capture.focus();
</script>
</body>
</html>
