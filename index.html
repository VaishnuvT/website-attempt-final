<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaishnuv Thiagarajan</title>
    <link rel="icon" type="image/png" href="./logo.png">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #000000;
            height: 100vh;
            display: flex;
            align-items: stretch;
            justify-content: center;
            padding: 20px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px;
            color: #ece0c4;
            line-height: 1.7;
        }

        #terminal {
            width: 100%;
            display: flex;
            flex-direction: column;
            background: #0e0e0e;
            border: 1.5px solid #c8a020;
            border-radius: 6px;
            padding: 28px 34px 28px;
            cursor: text;
            overflow: hidden;
        }

        #output {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: none;
        }

        #output::-webkit-scrollbar {
            display: none;
        }

        .prompt {
            color: #BF5700;
            user-select: none;
        }

        .welcome-row {
            display: flex;
            align-items: flex-start;
            gap: 24px;
        }

        .welcome-left {
            flex: 1 1 auto;
            min-width: 0;
            overflow: hidden;
        }

        .welcome-right {
            flex: 0 0 auto;
            max-width: 44%;
            overflow: hidden;
        }

        .logo-pre {
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            line-height: 1;
            color: #ece0c4;
            white-space: pre;
            margin: 2px 0 8px;
            letter-spacing: 0;
        }

        .portrait-pre {
            font-family: 'Courier New', Courier, monospace;
            font-size: 5px;
            line-height: 1;
            color: #ece0c4;
            white-space: pre;
            opacity: 0.85;
        }

        .version-tag {
            font-size: 14px;
            color: #ece0c4;
            margin-bottom: 2px;
        }

        .line {
            min-height: 1.5em;
            white-space: pre-wrap;
        }

        .cmd-name {
            color: #BF5700;
            display: inline-block;
            min-width: 140px;
        }

        .input-row {
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        #cmd-input {
            background: transparent;
            border: none;
            outline: none;
            color: #ece0c4;
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px;
            flex: 1;
            caret-color: #BF5700;
        }

        a {
            color: #D6D2C4;
            text-decoration: none;
        }

        a:hover {
            color: #ffffff;
            text-decoration: underline;
        }

        @media (max-width: 620px) {
            .logo-pre { font-size: 6px; }
            body { padding: 12px; font-size: 13px; }
            #terminal { padding: 16px 18px; }
            #cmd-input { font-size: 13px; }
        }
    </style>
</head>
<body>
<div id="terminal">
    <div id="output"></div>
    <div class="input-row">
        <span class="prompt">visitor@portfolio:~$&nbsp;</span>
        <input id="cmd-input" type="text" autofocus spellcheck="false" autocomplete="off" />
    </div>
</div>

<script>
    // ─── ASCII art logo ───────────────────────────────────────────────────────
    const LOGO = ` ██╗   ██╗  █████╗  ██╗ ███████╗ ██╗  ██╗ ███╗   ██╗ ██╗   ██╗ ██╗   ██╗
 ██║   ██║ ██╔══██╗ ██║ ██╔════╝ ██║  ██║ ████╗  ██║ ██║   ██║ ██║   ██║
 ██║   ██║ ███████║ ██║ ███████╗ ███████║ ██╔██╗ ██║ ██║   ██║ ██║   ██║
 ╚██╗ ██╔╝ ██╔══██║ ██║ ╚════██║ ██╔══██║ ██║╚██╗██║ ██║   ██║ ╚██╗ ██╔╝
  ╚████╔╝  ██║  ██║ ██║ ███████║ ██║  ██║ ██║ ╚████║ ╚██████╔╝  ╚████╔╝
   ╚═══╝   ╚═╝  ╚═╝ ╚═╝ ╚══════╝ ╚═╝  ╚═╝ ╚═╝  ╚═══╝  ╚═════╝    ╚═══╝

 ████████╗ ██╗  ██╗ ██╗  █████╗   ██████╗   █████╗  ██████╗   █████╗       ██╗  █████╗  ███╗   ██╗
 ╚══██╔══╝ ██║  ██║ ██║ ██╔══██╗ ██╔════╝  ██╔══██╗ ██╔══██╗ ██╔══██╗      ██║ ██╔══██╗ ████╗  ██║
    ██║    ███████║ ██║ ███████║ ██║  ███╗ ███████║ ██████╔╝ ███████║      ██║ ███████║ ██╔██╗ ██║
    ██║    ██╔══██║ ██║ ██╔══██║ ██║   ██║ ██╔══██║ ██╔══██╗ ██╔══██║ ██   ██║ ██╔══██║ ██║╚██╗██║
    ██║    ██║  ██║ ██║ ██║  ██║ ╚██████╔╝ ██║  ██║ ██║  ██║ ██║  ██║ ╚█████╔╝ ██║  ██║ ██║ ╚████║
    ╚═╝    ╚═╝  ╚═╝ ╚═╝ ╚═╝  ╚═╝  ╚═════╝  ╚═╝  ╚═╝ ╚═╝  ╚═╝ ╚═╝  ╚═╝  ╚════╝  ╚═╝  ╚═╝ ╚═╝  ╚═══╝`;

    // ─── Terminal helpers ─────────────────────────────────────────────────────
    const output = document.getElementById('output');
    const input  = document.getElementById('cmd-input');

    const PROMPT  = '<span class="prompt">visitor@portfolio:~$</span> ';
    const VERSION = 'v2.0.0';

    function line(html, cls = 'line') {
        const d = document.createElement('div');
        d.className = cls;
        d.innerHTML = html;
        output.appendChild(d);
    }

    function blank() { line(''); }
    function sep()   { line('--'); }
    function promptLine() { line(PROMPT + '~'); }

    // ─── Commands ─────────────────────────────────────────────────────────────
    const COMMANDS = {
        help() {
            line('Available commands:');
            blank();
            line('<span class="cmd-name">about</span>      who am I');
            line('<span class="cmd-name">experience</span> where I\'ve worked');
            line('<span class="cmd-name">projects</span>   things I\'ve built');
            line('<span class="cmd-name">contact</span>    how to reach me');
            line('<span class="cmd-name">clear</span>      clear the terminal');
        },
        about() {
            line('Vaishnuv Thiagarajan');
            blank();
            line('ECE Honors + Business Honors @ UT Austin (Texas ECB)');
            line('<a href="https://txproduct.org" target="_blank">President @ Texas Product Engineering Organization (TPEO)</a>');
            blank();
            line('Builder | Leader | Student');
            line('Hobbies: vibecoding or touching grass');
            line('Location: Austin, TX');
        },
        experience() {
            line('Experience:');
            blank();
            line('  Product Management Intern @ IBM');
            line('  AI Solutions Engineer @ Lendflow (YC W21)');
            line('  Growth &amp; Strategy Partner @ Anthropic');
            line('  Technology Analyst Intern @ State Farm');
        },
        projects() {
            line('Projects:');
            blank();
            line('  AI Agentic Deals Dashboard (Lendflow)');
            line('  Hardware-as-a-Service Web Platform');
            line('  <a href="https://www.scriptic.xyz/" target="_blank">Scriptic - AI Webpage Search Extension</a>');
            line('  <a href="https://www.aidr-app.xyz/" target="_blank">Aidr: Outdoor Safety Guidance App</a>');
        },
        contact() {
            line('Contact:');
            blank();
            line('  GitHub    <a href="https://github.com/VaishnuvT" target="_blank">github.com/VaishnuvT</a>');
            line('  LinkedIn  <a href="https://linkedin.com/in/Vaishnuv-Thiagarajan" target="_blank">linkedin.com/in/Vaishnuv-Thiagarajan</a>');
            line('  Email     <a href="mailto:vaishnuv.thiagarajan@gmail.com">vaishnuv.thiagarajan@gmail.com</a>');
        },
        clear() {
            output.innerHTML = '';
            welcome();
        }
    };

    function run(raw) {
        line(PROMPT + raw);
        blank();
        if (!raw.trim()) { promptLine(); return; }
        const cmd = raw.trim().toLowerCase();
        if (COMMANDS[cmd]) {
            COMMANDS[cmd]();
        } else {
            line("command not found: " + raw.trim() + ". Type 'help' for available commands.");
        }
        blank();
        promptLine();
        output.scrollTop = output.scrollHeight;
    }

    // ─── Welcome screen ───────────────────────────────────────────────────────
    function welcome() {
        promptLine();
        blank();
        line('Welcome to my portfolio: ' + new Date().toString().replace(/\s*\(.*\)$/, ''));
        blank();

        // Two-column wrapper
        const row = document.createElement('div');
        row.className = 'welcome-row';

        // ── Left column ──────────────────────────────────────────────────────
        const left = document.createElement('div');
        left.className = 'welcome-left';

        const logoPre = document.createElement('pre');
        logoPre.className = 'logo-pre';
        logoPre.textContent = LOGO;
        left.appendChild(logoPre);

        const ver = document.createElement('div');
        ver.className = 'version-tag';
        ver.textContent = VERSION;
        left.appendChild(ver);

        const addLeft = (html) => {
            const d = document.createElement('div');
            d.className = 'line';
            d.innerHTML = html;
            left.appendChild(d);
        };
        addLeft('');
        addLeft("Type 'help' to see list of available commands.");
        addLeft('');
        addLeft('--');
        addLeft('');
        addLeft("Builder | Leader | Student &mdash; UT Austin.");
        addLeft('--');

        // ── Right column — ASCII portrait ────────────────────────────────────
        const right = document.createElement('div');
        right.className = 'welcome-right';

        const portrait = document.createElement('pre');
        portrait.className = 'portrait-pre';
        fetch('./portrait.txt')
            .then(r => r.text())
            .then(t => { portrait.textContent = t; });
        right.appendChild(portrait);

        row.appendChild(left);
        row.appendChild(right);
        output.appendChild(row);

        blank();
        promptLine();
    }

    input.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            const val = input.value;
            input.value = '';
            run(val);
        }
    });

    document.getElementById('terminal').addEventListener('click', () => input.focus());

    welcome();
</script>
</body>
</html>
